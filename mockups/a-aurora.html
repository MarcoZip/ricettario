<!DOCTYPE html>
<html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockup A — Aurora Glass</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
  body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:#e9eef5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .device{width:390px;height:780px;border-radius:46px;background:#0b0d12;padding:12px;box-shadow:0 40px 90px rgba(30,40,80,.35);position:relative}
  .screen{width:100%;height:100%;border-radius:36px;overflow:hidden;position:relative;background:#f4f1fb}

  /* Aurora animata */
  .aurora{position:absolute;inset:0;overflow:hidden;z-index:0}
  .blob{position:absolute;border-radius:50%;filter:blur(48px);opacity:.75;animation:float 14s ease-in-out infinite}
  .b1{width:300px;height:300px;background:#ff7a59;top:-80px;left:-60px}
  .b2{width:260px;height:260px;background:#7b6cff;top:120px;right:-90px;animation-delay:-4s}
  .b3{width:240px;height:240px;background:#36d1b7;bottom:-40px;left:-30px;animation-delay:-8s}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,30px) scale(1.1)}66%{transform:translate(-15px,15px) scale(.95)}}

  .content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;padding:54px 20px 0}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
  .hi{font-size:13px;color:#5a5570;font-weight:600}
  .name{font-size:24px;font-weight:800;color:#241f38;letter-spacing:-.5px}
  .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#ff7a59,#7b6cff);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 8px 20px rgba(123,108,255,.4)}

  .search{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.7);border-radius:18px;padding:13px 16px;margin-bottom:24px;color:#7a7590;font-size:14px;box-shadow:0 8px 24px rgba(60,40,90,.08)}

  .sec{font-size:16px;font-weight:800;color:#241f38;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .sec span{font-size:12px;color:#7b6cff;font-weight:700}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;overflow:auto;padding-bottom:10px}
  .card{background:rgba(255,255,255,.5);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.75);border-radius:24px;padding:18px;box-shadow:0 10px 30px rgba(60,40,90,.1);position:relative;overflow:hidden}
  .card::after{content:"";position:absolute;top:-40%;right:-30%;width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));opacity:.18;filter:blur(10px)}
  .emoji{width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;background:linear-gradient(135deg,var(--g1),var(--g2));box-shadow:0 8px 18px rgba(0,0,0,.12);margin-bottom:12px}
  .cname{font-weight:700;font-size:14px;color:#241f38;line-height:1.2}
  .ccount{font-size:12px;color:#7a7590;margin-top:4px}

  .fab{position:absolute;bottom:96px;right:22px;width:60px;height:60px;border-radius:20px;background:linear-gradient(135deg,#ff7a59,#7b6cff);display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;box-shadow:0 14px 30px rgba(123,108,255,.5);z-index:3}
  .nav{position:absolute;bottom:0;left:0;right:0;height:78px;background:rgba(255,255,255,.6);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.7);display:flex;justify-content:space-around;align-items:center;padding-bottom:14px;z-index:2}
  .nav div{font-size:22px;opacity:.4}
  .nav .on{opacity:1;position:relative}
  .nav .on::after{content:"";position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:#7b6cff}
</style></head>
<body>
  <div class="device"><div class="screen">
    <div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
    <div class="content">
      <div class="topbar">
        <div><div class="hi">Ciao 👋</div><div class="name">Ricettario</div></div>
        <div class="avatar">🍳</div>
      </div>
      <div class="search">🔎 Cerca tra le tue ricette…</div>
      <div class="sec">Strumenti di cottura <span>Vedi tutti</span></div>
      <div class="grid">
        <div class="card" style="--g1:#ff9a59;--g2:#ff5e7e"><div class="emoji">🍟</div><div class="cname">Friggitrice ad aria</div><div class="ccount">3 ricette</div></div>
        <div class="card" style="--g1:#ff7a59;--g2:#ffb05e"><div class="emoji">🔥</div><div class="cname">Forno</div><div class="ccount">5 ricette</div></div>
        <div class="card" style="--g1:#7b6cff;--g2:#5ea8ff"><div class="emoji">⚡</div><div class="cname">Piano a induzione</div><div class="ccount">2 ricette</div></div>
        <div class="card" style="--g1:#36d1b7;--g2:#5ea8ff"><div class="emoji">🍳</div><div class="cname">Fornello a gas</div><div class="ccount">4 ricette</div></div>
        <div class="card" style="--g1:#9b6cff;--g2:#ff6cc4"><div class="emoji">♨️</div><div class="cname">Vaporiera</div><div class="ccount">1 ricetta</div></div>
        <div class="card" style="--g1:#ffb05e;--g2:#ff5e7e"><div class="emoji">⏲️</div><div class="cname">Pentola a pressione</div><div class="ccount">2 ricette</div></div>
      </div>
    </div>
    <div class="fab">＋</div>
    <div class="nav"><div class="on">🍲</div><div>📖</div><div>⚙️</div></div>
  </div></div>
</body></html>
