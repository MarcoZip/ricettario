<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Fornelli — anteprima splash</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b0c10; color: #eee; padding: 22px 16px 60px; }
  h1 { font-size: 1.3rem; text-align: center; margin: 4px 0 2px; }
  .sub { text-align: center; color: #9a978f; font-size: 0.9rem; margin: 0 0 22px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 26px; max-width: 900px; margin: 0 auto; justify-items: center; }
  .card { width: 100%; max-width: 300px; }
  .cap { text-align: center; font-weight: 800; margin: 12px 0 2px; font-size: 1.05rem; }
  .cap span { color: #ff9a52; }
  .desc { text-align: center; color: #9a978f; font-size: 0.82rem; min-height: 32px; }
  .replay { display: block; margin: 8px auto 0; background: #1c1d24; color: #ffd9a8; border: 1px solid #34353f; border-radius: 999px; padding: 7px 16px; font-weight: 700; font-size: 0.82rem; }

  /* Telefono */
  .screen { position: relative; width: 100%; aspect-ratio: 9 / 16; border-radius: 30px; overflow: hidden; box-shadow: 0 18px 40px -16px #000; border: 1px solid #23242c; background: #0e0f13; }

  /* App finta (rivelata sotto) */
  .app { position: absolute; inset: 0; background: #0e0f13; display: flex; flex-direction: column; opacity: 0; }
  .appbar { display: flex; align-items: center; gap: 8px; padding: 14px 14px 10px; font-weight: 800; }
  .appbar .mh { width: 26px; height: 26px; border-radius: 7px; }
  .hero { margin: 4px 14px 14px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, rgba(255,140,60,.22), rgba(255,140,60,.05)); border: 1px solid rgba(255,160,90,.22); }
  .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 14px; }
  .tiles span { height: 64px; border-radius: 14px; background: #16171d; border: 1px solid #23242c; }

  /* Splash arancione */
  .splash { position: absolute; inset: 0; background: linear-gradient(160deg, #ffa64d, #df5117); display: flex; align-items: center; justify-content: center; }
  .hat { width: 46%; overflow: visible; }
  .glow { position: absolute; width: 70%; aspect-ratio: 1; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,.5), transparent 60%); opacity: 0; }
  .ring { position: absolute; width: 30%; aspect-ratio: 1; border-radius: 50%; border: 4px solid rgba(255,255,255,.85); opacity: 0; }
  .steam { position: absolute; top: 18%; width: 8px; height: 60px; border-radius: 8px; background: linear-gradient(to top, rgba(255,255,255,.7), transparent); opacity: 0; }
  .spark { position: absolute; width: 10px; height: 10px; border-radius: 2px; opacity: 0; }

  /* =================== V1 — Cappello nell'header =================== */
  .v1 .splash { animation: v1splash 4.4s ease infinite; }
  .v1 .hat { animation: v1hat 4.4s cubic-bezier(.6,.05,.2,1) infinite; transform-origin: center; }
  .v1 .app { animation: v1app 4.4s ease infinite; }
  @keyframes v1hat {
    0%,12% { transform: translate(0,0) scale(1); }
    48%,78% { transform: translate(-43%,-78%) scale(.16); }
    92%,100% { transform: translate(0,0) scale(1); }
  }
  @keyframes v1splash {
    0%,12% { opacity: 1; }
    48%,100% { opacity: 0; }
    92% { opacity: 0; }
    96%,100% { opacity: 1; }
  }
  @keyframes v1app { 0%,30% { opacity: 0; } 55%,88% { opacity: 1; } 95%,100% { opacity: 0; } }

  /* =================== V2 — Vapore caldo =================== */
  .v2 .hat { animation: v2hat 4.4s ease infinite; transform-origin: center bottom; }
  .v2 .glow { animation: v2glow 4.4s ease infinite; }
  .v2 .splash { animation: v2splash 4.4s ease infinite; }
  .v2 .app { animation: v2app 4.4s ease infinite; }
  .v2 .steam { animation: v2steam 1.6s ease-in-out infinite; }
  .v2 .s1 { left: 42%; animation-delay: .0s; }
  .v2 .s2 { left: 50%; animation-delay: .35s; }
  .v2 .s3 { left: 58%; animation-delay: .7s; }
  @keyframes v2hat {
    0% { transform: scale(.4); opacity: 0; }
    14% { transform: scale(1.12); opacity: 1; }
    22% { transform: scale(.97); }
    30% { transform: scale(1); }
    46% { transform: scale(1.04); }
    62% { transform: scale(1) translateY(0); opacity: 1; }
    80%,100% { transform: scale(1.5) translateY(-6%); opacity: 0; }
  }
  @keyframes v2glow { 0%,20% { opacity: 0; transform: scale(.7); } 45% { opacity: .9; transform: scale(1); } 70% { opacity: .4; } 80%,100% { opacity: 0; } }
  @keyframes v2steam { 0% { opacity: 0; transform: translateY(10px) scaleY(.6); } 35% { opacity: .8; } 100% { opacity: 0; transform: translateY(-46px) scaleY(1.2); } }
  @keyframes v2splash { 0%,66% { opacity: 1; } 84%,100% { opacity: 0; } 96% { opacity: 0; } 100% { opacity: 1; } }
  @keyframes v2app { 0%,62% { opacity: 0; } 84%,94% { opacity: 1; } 100% { opacity: 0; } }

  /* =================== V3 — Pop goloso + scintille =================== */
  .v3 .hat { animation: v3hat 4.4s cubic-bezier(.2,1.6,.3,1) infinite; transform-origin: center; }
  .v3 .ring { animation: v3ring 4.4s ease infinite; }
  .v3 .splash { animation: v2splash 4.4s ease infinite; }
  .v3 .app { animation: v2app 4.4s ease infinite; }
  .v3 .spark { animation: v3spark 4.4s ease infinite; }
  @keyframes v3hat {
    0% { transform: scale(0) rotate(-40deg); opacity: 0; }
    18% { transform: scale(1.15) rotate(8deg); opacity: 1; }
    28% { transform: scale(.95) rotate(-3deg); }
    36% { transform: scale(1) rotate(0); }
    64% { transform: scale(1) rotate(0); opacity: 1; }
    80%,100% { transform: scale(1.6) rotate(0); opacity: 0; }
  }
  @keyframes v3ring { 0%,20% { opacity: 0; transform: scale(.3); } 30% { opacity: .9; } 50% { opacity: 0; transform: scale(2.4); } 100% { opacity: 0; } }
  @keyframes v3spark { 0%,24% { opacity: 0; transform: translate(0,0) scale(1); } 30% { opacity: 1; } 52% { opacity: 0; transform: translate(var(--x), var(--y)) scale(.5); } 100% { opacity: 0; } }

  /* =================== V4 — Disegno a mano =================== */
  .v4 .hat .fillpart { fill: #fff; opacity: 0; animation: v4fill 4.4s ease infinite; }
  .v4 .hat .outline { fill: none; stroke: #fff; stroke-width: 9; stroke-linejoin: round; stroke-linecap: round; }
  .v4 .hat .outline > * { stroke-dasharray: 1; stroke-dashoffset: 1; pathLength: 1; animation: v4draw 4.4s ease infinite; }
  .v4 .hat .o2 { animation-delay: .18s; }
  .v4 .hat .o3 { animation-delay: .34s; }
  .v4 .hat .o4 { animation-delay: .5s; }
  .v4 .hat .o5 { animation-delay: .66s; }
  .v4 .pleat { stroke: #df5117; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 1; stroke-dashoffset: 1; pathLength: 1; animation: v4pleat 4.4s ease infinite; }
  .v4 .splash { animation: v2splash 4.4s ease infinite; }
  .v4 .app { animation: v2app 4.4s ease infinite; }
  @keyframes v4draw { 0% { stroke-dashoffset: 1; } 40%,100% { stroke-dashoffset: 0; } }
  @keyframes v4fill { 0%,42% { opacity: 0; } 60%,100% { opacity: 1; } }
  @keyframes v4pleat { 0%,58% { stroke-dashoffset: 1; } 74%,100% { stroke-dashoffset: 0; } }
</style>
</head>
<body>
  <h1>🍳 Fornelli — anteprima splash</h1>
  <p class="sub">Le quattro animazioni girano in loop. Scegli il numero che ti piace di più.</p>

  <div class="grid" id="grid"></div>

<script>
  const HAT_FILL = `
    <svg class="hat" viewBox="0 0 512 512">
      <g fill="#fff">
        <circle cx="256" cy="214" r="78"/><circle cx="176" cy="237" r="61"/><circle cx="336" cy="237" r="61"/>
        <rect x="169" y="222" width="174" height="91"/><rect x="180" y="301" width="152" height="64" rx="19"/>
      </g>
      <g stroke="#df5117" stroke-width="8" stroke-linecap="round">
        <line x1="222" y1="317" x2="222" y2="351"/><line x1="256" y1="317" x2="256" y2="351"/><line x1="290" y1="317" x2="290" y2="351"/>
      </g>
    </svg>`;

  // Versione "disegno": contorni che si tracciano + riempimento
  const HAT_DRAW = `
    <svg class="hat" viewBox="0 0 512 512">
      <g class="fillpart">
        <circle cx="256" cy="214" r="78"/><circle cx="176" cy="237" r="61"/><circle cx="336" cy="237" r="61"/>
        <rect x="169" y="222" width="174" height="91"/><rect x="180" y="301" width="152" height="64" rx="19"/>
      </g>
      <g class="outline">
        <circle class="o1" cx="256" cy="214" r="78"/><circle class="o2" cx="176" cy="237" r="61"/><circle class="o3" cx="336" cy="237" r="61"/>
        <rect class="o4" x="169" y="222" width="174" height="91"/><rect class="o5" x="180" y="301" width="152" height="64" rx="19"/>
      </g>
      <g>
        <line class="pleat" x1="222" y1="317" x2="222" y2="351"/><line class="pleat" x1="256" y1="317" x2="256" y2="351"/><line class="pleat" x1="290" y1="317" x2="290" y2="351"/>
      </g>
    </svg>`;

  const MINI_HAT = `<svg class="mh" viewBox="0 0 512 512"><rect width="512" height="512" rx="115" fill="url(#g)"/><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffa64d"/><stop offset="1" stop-color="#df5117"/></linearGradient></defs><g fill="#fff"><circle cx="256" cy="214" r="78"/><circle cx="176" cy="237" r="61"/><circle cx="336" cy="237" r="61"/><rect x="169" y="222" width="174" height="91"/><rect x="180" y="301" width="152" height="64" rx="19"/></g></svg>`;

  const fauxApp = `
    <div class="app">
      <div class="appbar">${MINI_HAT} Fornelli</div>
      <div class="hero"></div>
      <div class="tiles"><span></span><span></span><span></span><span></span></div>
    </div>`;

  function sparks() {
    let s = "";
    const colors = ["#fff", "#ffe08a", "#fff3d6", "#ffd166"];
    for (let i = 0; i < 12; i++) {
      const ang = (i / 12) * Math.PI * 2;
      const x = Math.round(Math.cos(ang) * 90) + "px";
      const y = Math.round(Math.sin(ang) * 90) + "px";
      s += `<span class="spark" style="--x:${x};--y:${y};background:${colors[i % colors.length]};animation-delay:${(i % 4) * 30}ms"></span>`;
    }
    return s;
  }

  const variants = [
    { cls: "v1", title: "Cappello nell'header", desc: "Si rimpicciolisce e vola nel logo in alto.", splash: HAT_FILL },
    { cls: "v2", title: "Vapore caldo", desc: "Rimbalzo + volute di vapore + alone caldo.", splash: `<div class="glow"></div>` + HAT_FILL + `<span class="steam s1"></span><span class="steam s2"></span><span class="steam s3"></span>` },
    { cls: "v3", title: "Pop goloso + scintille", desc: "Scatto elastico, anello di luce, scintille.", splash: `<div class="ring"></div>` + HAT_FILL + sparks() },
    { cls: "v4", title: "Disegno a mano", desc: "Il contorno si traccia, poi si riempie.", splash: HAT_DRAW }
  ];

  const grid = document.getElementById("grid");
  variants.forEach((v, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="screen ${v.cls}">
        ${fauxApp}
        <div class="splash">${v.splash}</div>
      </div>
      <div class="cap"><span>${i + 1}</span> · ${v.title}</div>
      <div class="desc">${v.desc}</div>
      <button class="replay">▶ Rivedi</button>`;
    grid.appendChild(card);
    const screen = card.querySelector(".screen");
    card.querySelector(".replay").addEventListener("click", () => {
      const c = screen.className;
      screen.className = c.replace(" paused", "");
      // forza il restart delle animazioni
      screen.querySelectorAll("*").forEach((el) => { el.style.animation = "none"; el.offsetHeight; el.style.animation = ""; });
    });
  });
</script>
</body>
</html>
